name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1
      - name: Install Python dependencies
        run: python -m pip install -e ".[dev,ui,hardware,export]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src
      - name: Tests
        run: pytest --cov=eor_control --cov-report=term-missing
