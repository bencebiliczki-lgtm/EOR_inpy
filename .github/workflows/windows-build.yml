name: Windows build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]" pyinstaller
      - name: Test
        run: pytest
      - name: Build executable
        run: pyinstaller --name AFKI-EOR --onefile src/eor_control/__main__.py
      - uses: actions/upload-artifact@v4
        with:
          name: AFKI-EOR-${{ github.ref_name }}
          path: dist/AFKI-EOR.exe

