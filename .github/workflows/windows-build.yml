name: Windows build

on:
  workflow_dispatch:
  push:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev,ui,hardware,export,package]"
      - name: Test
        run: pytest
      - name: Build executable
        run: pyinstaller --name AFKI-EOR --onefile src/eor_control/__main__.py
      - name: Create installer package
        shell: pwsh
        run: |
          $refName = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($refName)) {
            $refName = "${{ github.sha }}"
          }
          $refName = $refName -replace '[^A-Za-z0-9._-]', '-'
          $packageName = "AFKI-EOR-$refName.zip"

          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item "dist/AFKI-EOR.exe" -Destination "package/AFKI-EOR.exe"
          Set-Content -Path "package/README.txt" -Value "AFKI-EOR Windows build generated by GitHub Actions."
          Compress-Archive -Path "package/*" -DestinationPath $packageName -Force

          "PACKAGE_PATH=$packageName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - uses: actions/upload-artifact@v4
        with:
          name: AFKI-EOR-${{ github.ref_name }}
          path: dist/AFKI-EOR.exe
      - uses: actions/upload-artifact@v4
        with:
          name: AFKI-EOR-package-${{ github.ref_name }}
          path: ${{ env.PACKAGE_PATH }}
      # Expected GitHub Secrets:
      # SSH_HOST, SSH_USERNAME, SSH_PASSWORD, SSH_PORT (optional), SSH_REMOTE_DIR
      # TAILSCALE_CLIENT_ID, TAILSCALE_CLIENT_SECRET
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.SSH_HOST }}

      - name: Upload package over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_REMOTE_DIR: ${{ secrets.SSH_REMOTE_DIR }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SSH_PORT)) {
            $env:SSH_PORT = "22"
          }

          if (
            [string]::IsNullOrWhiteSpace($env:SSH_HOST) -or
            [string]::IsNullOrWhiteSpace($env:SSH_USERNAME) -or
            [string]::IsNullOrWhiteSpace($env:SSH_PASSWORD)
          ) {
            throw "Hiányzik az SSH_HOST, SSH_USERNAME vagy SSH_PASSWORD secret."
          }

          python -m pip install --quiet paramiko

          @'
          import os
          import pathlib
          import posixpath
          import paramiko

          host = os.environ["SSH_HOST"]
          port = int(os.environ.get("SSH_PORT", "22"))
          username = os.environ["SSH_USERNAME"]
          password = os.environ["SSH_PASSWORD"]
          package_path = pathlib.Path(os.environ["PACKAGE_PATH"])
          remote_dir = os.environ.get(
              "SSH_REMOTE_DIR",
              "C:/Users/Public/Downloads"
          ).rstrip("/")

          client = paramiko.SSHClient()
          client.set_missing_host_key_policy(paramiko.AutoAddPolicy())

          try:
              client.connect(
                  hostname=host,
                  port=port,
                  username=username,
                  password=password,
                  look_for_keys=False,
                  allow_agent=False,
                  timeout=30,
                  banner_timeout=30,
                  auth_timeout=30,
              )

              transport = client.get_transport()
              if transport is not None:
                  transport.set_keepalive(15)

              sftp = client.open_sftp()
              target_path = posixpath.join(
                  remote_dir,
                  package_path.name,
              )

              print(f"Uploading package to: {target_path}")
              sftp.put(str(package_path), target_path)
              sftp.close()

              print("Package uploaded successfully.")
          finally:
              client.close()
          '@ | Set-Content -Path "$env:RUNNER_TEMP\upload_package.py"

          python "$env:RUNNER_TEMP\upload_package.py"

